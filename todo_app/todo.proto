syntax = "proto3";

package todoPackage;

service Todo {
    rpc CreateTodo(TodoItem) returns (TodoItem) {}
    rpc ReadTodos(Void) returns (TodoItems) {}
    
    // NEW: Streaming method for high-performance data transfer
    rpc StreamTodos(Void) returns (stream TodoItem) {}
}

message Void {}

message TodoItem {
    int32 id = 1;
    string title = 2;
    string description = 3;
    bool completed = 4;
}

message TodoItems {
    repeated TodoItem items = 1;
}